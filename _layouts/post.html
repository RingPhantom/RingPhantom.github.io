<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; line-height: 1.7; color: #333; }
        .back { display: block; margin-bottom: 20px; text-decoration: none; color: #2f81f7; }
        h1 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .content { background: #fff; }
    </style>
</head>
<body>
    <a href="/" class="back">← 返回首页</a>
    <h1>{{ page.title }}</h1>
    <div class="content">
        {{ content }}
    </div>
    <hr>
    <p>发布于：{{ page.date | date: "%Y-%m-%d" }}</p>
</body>
</html>
