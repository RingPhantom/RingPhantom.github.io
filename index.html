<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到我的空间</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: #f6f8fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 90%; }
        h1 { color: #24292f; margin-bottom: 0.5rem; }
        p { color: #57606a; line-height: 1.6; }
        .links { margin-top: 1.5rem; display: flex; justify-content: center; gap: 15px; }
        .btn { text-decoration: none; background: #2f81f7; color: white; padding: 8px 16px; border-radius: 6px; font-size: 14px; transition: 0.3s; }
        .btn:hover { background: #0969da; }
        .footer { margin-top: 2rem; font-size: 12px; color: #8c959f; }
    </style>
</head>
<body>
    <div class="card">
        <h1>你好，我是你的名字</h1>
        <p>这是我的第一个个人网站。目前正在建设中...</p>
        <p>我喜欢折腾技术、记录生活，这里是我的小小数字领地。</p>
        <div class="links">
            <a href="https://github.com/RingPhantom" class="btn">GitHub</a>
            <a href="mailto:temp" class="btn">联系我</a>
        </div>
        <div class="footer">由 GitHub Pages 强力驱动</div>
    </div>
</body>
</html>
